<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <title>EliteHomes | Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
    * {
    box-sizing: border-box;
    }

    body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background:
    linear-gradient(rgba(10, 37, 64, 0.88), rgba(10, 37, 64, 0.88)),
    url('https://via.placeholder.com/1600x900') center / cover no-repeat;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    }

    /* ===== Card ===== */
    .card {
    width: 100%;
    max-width: 400px;
    padding: 40px 32px;
    background: rgba(255, 255, 255, 0.96);
    backdrop-filter: blur(10px);
    border-radius: 16px;
    box-shadow: 0 25px 60px rgba(0, 0, 0, 0.3);
    animation: cardEnter 0.7s ease;
    }

    @keyframes cardEnter {
    from {
    opacity: 0;
    transform: translateY(30px) scale(0.97);
    }
    to {
    opacity: 1;
    transform: translateY(0) scale(1);
    }
    }

    /* ===== Logo ===== */
    .logo {
    text-align: center;
    margin-bottom: 28px;
    }

    .logo img {
    height: 46px;
    }

    .logo h2 {
    margin: 10px 0 0;
    font-size: 26px;
    color: #0A2540;
    }

    .logo span {
    color: #C9A227;
    }

    /* ===== Inputs ===== */
    label {
    margin-top: 18px;
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #0A2540;
    }

    input,
    select {
    width: 100%;
    padding: 14px;
    margin-top: 6px;
    font-size: 14px;
    border-radius: 10px;
    border: 1px solid #d1d5db;
    outline: none;
    transition: all 0.3s ease;
    }

    input:focus,
    select:focus {
    border-color: #C9A227;
    box-shadow: 0 0 0 3px rgba(201, 162, 39, 0.25);
    }

    /* ===== Button ===== */
    button {
    width: 100%;
    margin-top: 28px;
    padding: 15px;
    border-radius: 12px;
    background: linear-gradient(135deg, #C9A227, #b8961f);
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    border: none;
    cursor: pointer;
    transition: all 0.3s ease;
    }

    button:hover {
    transform: translateY(-2px);
    box-shadow: 0 15px 30px rgba(201, 162, 39, 0.5);
    }

    /* ===== Links ===== */
    .links,
    .link {
    text-align: center;
    margin-top: 18px;
    font-size: 14px;
    }

    .links a,
    .link a {
    color: #0A2540;
    font-weight: 600;
    text-decoration: none;
    }

    .links a:hover,
    .link a:hover {
    color: #C9A227;
    text-decoration: underline;
    }

    /* ===== TOAST NOTIFICATION ===== */
    .toast {
    position: fixed;
    top: 25px;
    left: 50%;
    transform: translateX(-50%) translateY(-30px);
    min-width: 260px;
    max-width: 90%;
    padding: 14px 22px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    text-align: center;
    color: #fff;
    opacity: 0;
    pointer-events: none;
    z-index: 9999;
    transition: all 0.4s ease;
    }

    .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
    }

    .toast.success {
    background: linear-gradient(135deg, #16a34a, #15803d);
    box-shadow: 0 10px 25px rgba(22, 163, 74, 0.5);
    }

    .toast.error {
    background: linear-gradient(135deg, #dc2626, #b91c1c);
    box-shadow: 0 10px 25px rgba(220, 38, 38, 0.5);
    }

    /* ===== Mobile Tweaks ===== */
    @media (max-width: 480px) {
    .card {
    padding: 32px 24px;
    }

    .logo h2 {
    font-size: 24px;
    }
    }
</style>
</head>

<body>
<div id="toast" class="toast"></div>

<div class="card">
    <div class="logo">
        <img src="images/home.png" alt="EliteHomes Logo">
        <h2>Elite<span>Homes</span></h2>
    </div>

    <form id="loginForm">
        <label>Username</label>
        <input type="text" id="loginUsername" placeholder="Enter username" required>

        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="Enter password" required>

        <label>Role</label>
        <select id="loginRole" required>
            <option value="">Select Role</option>
            <option value="buyer">Buyer</option>
            <option value="seller">Seller</option>
        </select>

        <button type="submit">Login</button>
    </form>



    <div class="links">
        Don’t have an account?
        <a href="register.html">Register</a>
    </div>
    <div class="link">
        <a onclick="window.location.href='index.html'">← Back to Home</a>
    </div>
</div>
<script>

    const API_URL = 'http://localhost:8083';
    const toast = document.getElementById("toast");

    function showToast(message, type) {
        toast.textContent = message;
        toast.className = `toast show ${type}`;
        setTimeout(() => toast.classList.remove("show"), 2000);
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const loginData = {
            username: document.getElementById('loginUsername').value,
            password: document.getElementById('loginPassword').value,
            role: document.getElementById('loginRole').value
        };

        console.log("Sending login data:", loginData);

        try {
            const response = await fetch(`${API_URL}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(loginData)
            });

            const text = await response.text();
            console.log("Login response:", text);

            if (!isNaN(text)) {
                localStorage.setItem("isLoggedIn", "true");
                localStorage.setItem("userId", text);
                localStorage.setItem("username", loginData.username);
                localStorage.setItem("role", loginData.role);

                console.log("Logged in as:", loginData.role);

                showToast("Login successful ✔", "success");

                setTimeout(() => {
                    if (loginData.role === "seller") {
                        window.location.replace("seller-dashboard.html");
                    } else {
                        window.location.replace("index.html");
                    }
                }, 800);

            } else {
                showToast(text, "error");
            }

        } catch (err) {
            console.error("Login error:", err);
            showToast("Server error. Try again.", "error");
        }
    });
</script>






</body>
</html>
