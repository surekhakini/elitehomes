<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Seller Dashboard | EliteHomes</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    /* ---------------- RESET & BASE ---------------- */
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
    }

    body {
    background: #F4F6FB;
    color: #0F172A;
    line-height: 1.6;
    }

    /* ---------------- HEADER ---------------- */
    header {
    background: #0A2540;
    padding: 16px clamp(20px, 6vw, 80px);
    display: flex;
    justify-content: space-between;
    align-items: center;
    }

    nav a {
    color: #E5E7EB;
    margin-left: 24px;
    text-decoration: none;
    font-weight: 500;
    font-size: 14px;
    transition: color .2s ease;
    }

    nav a:hover {
    color: #FACC15;
    }

    /* ---------------- DASHBOARD HEADER ---------------- */
    .dashboard-header {
    padding: 40px clamp(20px, 6vw, 80px) 24px;
    }

    .dashboard-header h1 {
    font-size: clamp(24px, 4vw, 34px);
    font-weight: 700;
    }

    .dashboard-header p {
    color: #64748B;
    margin-top: 6px;
    font-size: 14px;
    }

    /* ---------------- STATS GRID ---------------- */
    .stats-grid {
    padding: 0 clamp(20px, 6vw, 80px) 40px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    }

    .stat-card {
    background: #FFFFFF;
    border-radius: 16px;
    padding: 22px;
    box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
    transition: transform .2s ease, box-shadow .2s ease;
    }

    .stat-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 30px rgba(15, 23, 42, 0.12);
    }

    .stat-card h3 {
    font-size: 13px;
    font-weight: 500;
    color: #64748B;
    }

    .stat-card p {
    font-size: 28px;
    font-weight: 700;
    margin-top: 6px;
    }

    /* ---------------- TABLE ---------------- */
    .table-wrapper {
    padding: 0 clamp(20px, 6vw, 80px) 80px;
    overflow-x: auto;
    }

    table {
    width: 100%;
    min-width: 700px;
    background: #FFFFFF;
    border-radius: 16px;
    border-collapse: collapse;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }

    thead {
    background: #0A2540;
    color: #FFFFFF;
    }

    th, td {
    padding: 16px;
    font-size: 14px;
    text-align: left;
    white-space: nowrap;
    }

    tbody tr {
    border-bottom: 1px solid #E5E7EB;
    transition: background .15s ease;
    }

    tbody tr:hover {
    background: #F8FAFC;
    }

    /* ---------------- PROPERTY CELL ---------------- */
    .property-cell {
    display: flex;
    align-items: center;
    gap: 14px;
    }

    .property-cell img {
    width: 72px;
    height: 52px;
    object-fit: cover;
    border-radius: 8px;
    background: #E5E7EB;
    }

    /* ---------------- BADGES ---------------- */
    .badge {
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    }

    .high {
    background: #DCFCE7;
    color: #166534;
    }

    .medium {
    background: #FEF3C7;
    color: #92400E;
    }

    .low {
    background: #FEE2E2;
    color: #991B1B;
    }

    /* ---------------- FOOTER ---------------- */
    footer {
    background: #0A2540;
    color: #CBD5E1;
    padding: 32px clamp(20px, 6vw, 80px);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    font-size: 13px;
    }

    /* ---------------- HIDDEN ELEMENTS ---------------- */
    #totalContacts,
    .stat-card.contacts-card,
    th:nth-child(4),
    td:nth-child(4),
    th:nth-child(5),
    td:nth-child(5),
    th:nth-child(6),
    td:nth-child(6) {
    display: none;
    }

    /* ---------------- MOBILE OPTIMIZATION ---------------- */
    @media (max-width: 768px) {
    header {
    flex-direction: column;
    gap: 10px;
    align-items: flex-start;
    }

    nav a {
    margin-left: 0;
    margin-right: 16px;
    }

    table {
    min-width: 600px;
    }
    }
</style>
</head>

<body>

<header>
    <div style="display:flex;gap:10px;align-items:center;">
        <img src="images/home.png" style="height:36px">
        <span style="font-size:24px;font-weight:700;color:#fff;">
            Elite<span style="color:#C9A227;">Homes</span>
        </span>
    </div>
    <nav>
        <a href="seller.html">Add Property</a>
        <a href="#" id="logoutBtn">Logout</a>
    </nav>
</header>

<div class="dashboard-header">
    <h1>Seller Dashboard</h1>
    <p>Live performance of your properties</p>
</div>

<div class="stats-grid">
    <div class="stat-card">
        <h3>Total Properties</h3>
        <p id="totalProperties">0</p>
    </div>

    <div class="stat-card">
        <h3>Total Views</h3>
        <p id="totalViews">0</p>
    </div>

    <div class="stat-card">
        <h3>Total Wishlists</h3>
        <p id="totalWishlists">0</p>
    </div>

    <!-- kept for JS, hidden via CSS -->
    <div class="stat-card contacts-card">
        <h3>Contact Requests</h3>
        <p id="totalContacts">0</p>
    </div>
</div>


<div class="table-wrapper">
    <table>
        <thead>
        <tr>
            <th>Property</th>
            <th>Views</th>
            <th>Wishlists</th>
            <th>Contacts</th>
            <th>Interest</th>
            <th>Status</th>
        </tr>
        </thead>
        <tbody id="propertyTable"></tbody>
    </table>
</div>

<footer>
    <p>© 2025 EliteHomes</p>
    <p>Seller Analytics Dashboard</p>
</footer>

<script>
    document.addEventListener("DOMContentLoaded", () => {

        const seller = localStorage.getItem("username");
        if (!seller) {
            window.location.href = "login.html";
            return;
        }

        fetch(`http://localhost:8083/api/seller/dashboard/${seller}`)
            .then(res => res.json())
            .then(data => {

                // ✅ Dashboard stats
                document.getElementById("totalProperties").innerText = data.totalProperties;
                document.getElementById("totalViews").innerText = data.totalViews;
                document.getElementById("totalWishlists").innerText = data.totalWishlists;
                document.getElementById("totalContacts").innerText = data.totalContacts;

                // ✅ Properties table
                const table = document.getElementById("propertyTable");
                table.innerHTML = "";

                data.properties.forEach(p => {

                    const interest =
                        p.views > 300 ? "high" :
                        p.views > 100 ? "medium" : "low";

                    table.innerHTML += `
                    <tr>
                        <td class="property-cell">
                            <img src="${p.imageUrl}">
                            ${p.title} (${p.city})
                        </td>
                        <td>${p.views}</td>
                        <td>${p.wishlistCount}</td>
                        <td>${p.contactCount}</td>
                        <td>
                            <span class="badge ${interest}">
                                ${interest.charAt(0).toUpperCase() + interest.slice(1)}
                            </span>
                        </td>
                        <td>Active</td>
                    </tr>`;
                });
            })
            .catch(err => console.error("Dashboard error:", err));
    });

    document.getElementById("logoutBtn").onclick = () => {
        localStorage.clear();
        window.location.href = "login.html";
    };
</script>

</body>
</html>
